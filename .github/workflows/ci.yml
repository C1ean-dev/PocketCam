name: CI

on:
  workflow_call:
  push:
    branches: [main, master, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  dotnet:
    name: Windows / .NET
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore PocketCam.sln
      - name: Test core
        run: dotnet test PocketCam.sln -c Release --no-restore --collect:"XPlat Code Coverage"
      - name: Build desktop
        run: dotnet publish src/PocketCam.Desktop/PocketCam.Desktop.csproj -c Release -r win-x64 --no-restore
      - name: Build virtual camera host
        run: dotnet publish src/PocketCam.VirtualCamera.Host/PocketCam.VirtualCamera.Host.csproj -c Release -r win-x64
      - name: Build virtual camera source
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Visual C++ x64 build tools were not found." }
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64"
          dotnet publish src/PocketCam.VirtualCamera.Source/PocketCam.VirtualCamera.Source.csproj -c Release -r win-x64

  windows-10-camera:
    name: Windows 10 / DirectShow
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Build and register DirectShow camera
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Visual C++ x64 build tools were not found." }
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64"
          dotnet publish src/PocketCam.VirtualCamera.Source/PocketCam.VirtualCamera.Source.csproj -c Release -r win-x64 -o directshow-smoke
          $source = (Resolve-Path directshow-smoke/PocketCam.VirtualCamera.Source.dll).Path
          $register = Start-Process "$env:SystemRoot\System32\regsvr32.exe" -ArgumentList @('/s', $source) -Wait -PassThru
          if ($register.ExitCode -ne 0) { throw "regsvr32 failed with exit code $($register.ExitCode)" }
          try {
            $categoryKey = "Registry::HKEY_CLASSES_ROOT\CLSID\{860BB310-5D01-11D0-BD3B-00A0C911CE86}\Instance"
            $cameraClassId = [guid]"4273C9FA-4D74-4C61-9B5B-7D032BFCBDA8"
            $registered = @(Get-ChildItem $categoryKey | ForEach-Object {
              $registeredClassId = (Get-ItemProperty $_.PSPath).CLSID
              if ($registeredClassId -and ([guid]$registeredClassId -eq $cameraClassId)) { $_ }
            })
            if ($registered.Count -ne 1) {
              Get-ChildItem $categoryKey | ForEach-Object { Get-ItemProperty $_.PSPath | Select-Object PSChildName, FriendlyName, CLSID }
              throw "PocketCam DirectShow camera was not registered exactly once."
            }
          }
          finally {
            $unregister = Start-Process "$env:SystemRoot\System32\regsvr32.exe" -ArgumentList @('/s', '/u', $source) -Wait -PassThru
            if ($unregister.ExitCode -ne 0) { throw "DirectShow camera cleanup failed with exit code $($unregister.ExitCode)" }
          }

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.11.1
          cache-provider: basic
      - name: Tests, lint and debug APK
        run: gradle :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
