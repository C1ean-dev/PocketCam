name: CI

on:
  workflow_call:
  push:
    branches: [main, master, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  dotnet:
    name: Windows / .NET
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore PocketCam.sln
      - name: Test core
        run: dotnet test PocketCam.sln -c Release --no-restore --collect:"XPlat Code Coverage"
      - name: Build desktop
        run: dotnet publish src/PocketCam.Desktop/PocketCam.Desktop.csproj -c Release -r win-x64 --no-restore
      - name: Build virtual camera host
        run: dotnet publish src/PocketCam.VirtualCamera.Host/PocketCam.VirtualCamera.Host.csproj -c Release -r win-x64
      - name: Build virtual camera source
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Visual C++ x64 build tools were not found." }
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64"
          dotnet publish src/PocketCam.VirtualCamera.Source/PocketCam.VirtualCamera.Source.csproj -c Release -r win-x64

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1
      - name: Tests, lint and debug APK
        run: gradle :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
