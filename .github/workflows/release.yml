name: Release

on:
  push:
    tags: ["v*"]
permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  android:
    name: APK assinado
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: android
    env:
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 8.11.1
          cache-provider: basic
      - name: Preparar assinatura
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > release.jks
          else
            keytool -genkeypair -noprompt -keystore release.jks -storepass pocketcam-ci -keypass pocketcam-ci -alias pocketcam -keyalg RSA -keysize 3072 -validity 30 -dname "CN=PocketCam CI"
            echo "ANDROID_KEY_ALIAS=pocketcam" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_PASSWORD=pocketcam-ci" >> "$GITHUB_ENV"
            echo "ANDROID_STORE_PASSWORD=pocketcam-ci" >> "$GITHUB_ENV"
          fi
          echo "ANDROID_KEYSTORE_PATH=$PWD/release.jks" >> "$GITHUB_ENV"
      - name: Build release APK
        run: gradle :app:testReleaseUnitTest :app:lintRelease :app:assembleRelease --stacktrace
      - name: Preparar artefato
        run: |
          mkdir -p ../artifacts
          cp app/build/outputs/apk/release/app-release.apk ../artifacts/PocketCam-Android.apk
      - uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: artifacts/PocketCam-Android.apk

  windows:
    name: Aplicativo Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Publicar componentes
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) { throw "Visual C++ x64 build tools were not found." }
          Import-Module "$vsPath\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vsPath -SkipAutomaticLocation -DevCmdArguments "-arch=x64 -host_arch=x64"
          dotnet publish src/PocketCam.Desktop/PocketCam.Desktop.csproj -c Release -r win-x64 -o package/PocketCam
          dotnet publish src/PocketCam.VirtualCamera.Host/PocketCam.VirtualCamera.Host.csproj -c Release -r win-x64 -o package/PocketCam/virtual-camera
          dotnet publish src/PocketCam.VirtualCamera.Source/PocketCam.VirtualCamera.Source.csproj -c Release -r win-x64 -o package/PocketCam/virtual-camera
      - name: Incluir ADB oficial
        shell: pwsh
        run: |
          Invoke-WebRequest https://dl.google.com/android/repository/platform-tools-latest-windows.zip -OutFile platform-tools.zip
          Expand-Archive platform-tools.zip -DestinationPath adb-package
          New-Item -ItemType Directory -Force package/PocketCam/tools | Out-Null
          Copy-Item adb-package/platform-tools/adb.exe package/PocketCam/tools/
          Copy-Item adb-package/platform-tools/AdbWinApi.dll package/PocketCam/tools/
          Copy-Item adb-package/platform-tools/AdbWinUsbApi.dll package/PocketCam/tools/
      - name: Compactar
        shell: pwsh
        run: |
          Copy-Item README.md,THIRD_PARTY_NOTICES.md package/PocketCam/
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive package/PocketCam/* artifacts/PocketCam-Windows-win-x64.zip
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: artifacts/PocketCam-Windows-win-x64.zip

  publish:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [android, windows]
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: artifacts
          merge-multiple: true
      - name: Checksums
        run: cd artifacts && sha256sum * > SHA256SUMS.txt
      - name: Publicar release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" artifacts/* --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag
